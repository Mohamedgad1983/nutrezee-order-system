# Admin SPA + same-origin API reverse proxy (WP-14 deploy blocker D1).
# The SPA calls the API on RELATIVE paths with credentials:'include'
# (app/apps/admin/src/App.tsx) — this proxy makes those calls same-origin so the
# nz_session cookie rides along with no CORS surface at all.
#
# TLS (D2): terminate HTTPS in front of this server (platform LB or a TLS proxy).
# The API image runs NODE_ENV=production, so the session cookie is Secure by
# default — browser logins FAIL over plain HTTP unless COOKIE_SECURE=false is
# explicitly set for a pre-TLS internal smoke (see app/.env.example).
#
# Upstream "api:3000" matches the compose service name (docker/compose.yml).
# On a platform without compose DNS, replace it at deploy time.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API route prefixes, generated from the controllers under
    # app/apps/api/src (@Controller prefixes + empty-prefix route roots).
    # Bare /kitchen is deliberately NOT here — it is the SPA board page;
    # only /kitchen/<subpath> (board, generate-tickets, escalations,
    # fulfillment-days) belongs to the API. (/|$) keeps /orders and
    # /orders/:id matched while /ordersfoo is not.
    location ~ ^/(auth|health|drafts|review-queue|orders|payment-reviews|payment-refunds|tickets|notifications|templates|reports|exports|bridge|imports|settings|staff|rbac|audit|customers|catalog)(/|$) {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bare /kitchen is the SPA board page (exact match beats the prefix block
    # below). Without this, nginx's implicit trailing-slash rule 301s /kitchen
    # to /kitchen/, which proxies to the API and 404s — found live 2026-06-12;
    # `nginx -t` in CI cannot catch behavioral issues like this.
    location = /kitchen {
        try_files /index.html =404;
    }

    location /kitchen/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: '/', '/kitchen', and any future client route load the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
