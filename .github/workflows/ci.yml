# Nutrezee Order System CI — WP-01: real suites against PostgreSQL 16 + real guards.
# Suite jobs run vitest filtered by suite name; suites not yet implemented pass via
# explicit placeholders (tests/placeholder) — placeholder green means "not implemented",
# never "verified" (test_strategy).
name: ci
on:
  push:
    branches: ["main", "build/**"]
  pull_request:

defaults:
  run:
    working-directory: app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: app/package-lock.json }
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: app/package-lock.json }
      - run: npm ci
      - run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: app/package-lock.json }
      - run: npm ci
      - run: npm run build

  suites:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nutrezee
          POSTGRES_PASSWORD: nutrezee
          POSTGRES_DB: nutrezee_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nutrezee"
          --health-interval 5s --health-timeout 3s --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        suite: [ts-u, ts-i, ts-m, ts-r, ts-a, ts-c, ts-e, ts-s]
    name: ${{ matrix.suite }}
    env:
      DATABASE_URL_TEST: postgres://nutrezee:nutrezee@localhost:5432/nutrezee_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: app/package-lock.json }
      - run: npm ci
      - run: npx vitest run -t "${SUITE_FILTER}"
        env:
          SUITE_FILTER: ${{ matrix.suite == 'ts-u' && 'TS-U' || matrix.suite == 'ts-i' && 'TS-I' || matrix.suite == 'ts-m' && 'TS-M' || matrix.suite == 'ts-r' && 'TS-R' || matrix.suite == 'ts-a' && 'TS-A' || matrix.suite == 'ts-c' && 'TS-C' || matrix.suite == 'ts-e' && 'TS-E' || 'TS-S' }}

  boundary-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: node scripts/scan-cross-module-writes.mjs

  no-get-mutation-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: node scripts/scan-no-get-mutation.mjs

  # D6 (WP-14 deploy readiness): compose + Dockerfiles + nginx proxy config were
  # authored on a Docker-less machine and never validated — validate them here.
  # This proves syntax + image builds; a full `compose up` smoke still happens on
  # the staging host per 16_Deployment/staging_provisioning_checklist.md §6.
  docker-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: compose config
        run: docker compose -f docker/compose.yml config --quiet
      - name: nginx proxy config syntax (D1) — fake the api host so config-load DNS resolves
        run: |
          docker run --rm --add-host api:127.0.0.1 \
            -v "$PWD/docker/nginx.admin.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:alpine nginx -t
      - name: build api migrate stage (D3)
        run: docker build -f docker/Dockerfile.api --target migrate -t nutrezee-api:migrate .
      - name: build api runtime image
        run: docker build -f docker/Dockerfile.api -t nutrezee-api:ci .
      - name: build admin image (D1 config baked in)
        run: docker build -f docker/Dockerfile.admin -t nutrezee-admin:ci .
